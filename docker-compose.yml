services:
  panel:
    build: .
    container_name: mtproto-panel
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mtproto
      POSTGRES_PASSWORD: mtproto
      POSTGRES_DB: mtproto
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
