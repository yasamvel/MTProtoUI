<!DOCTYPE html>
<html>
<head>
    <title>MTProtoUI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-5xl mx-auto py-10">

<div class="bg-white rounded-2xl shadow p-6 mb-6">
<div class="flex justify-between items-center">
<div>
<h1 class="text-3xl font-bold">MTProtoUI</h1>
<p class="text-gray-500 mt-2">Working MVP Panel</p>
</div>

<div class="text-sm text-gray-500">
<a href="#" class="mr-2">RU</a>
<a href="#">EN</a>
</div>
</div>
</div>

<div class="bg-white rounded-2xl shadow p-6 mb-6">
<h2 class="text-xl font-semibold mb-4">Create Proxy</h2>

<form method="POST" action="/generate">

<div class="mb-4">
<label class="block mb-2">Proxy Type</label>

<select name="type" class="w-full border rounded-xl px-4 py-3">
<option value="classic">Classic</option>
<option value="dd">DD Secure</option>
<option value="ee">EE FakeTLS</option>
</select>
</div>

<div class="mb-4">
<label class="block mb-2">Domain (for EE)</label>

<input
type="text"
name="domain"
placeholder="google.com"
class="w-full border rounded-xl px-4 py-3"
>
</div>

<button class="bg-black text-white px-6 py-3 rounded-xl">
Generate
</button>

</form>
</div>

<div class="bg-white rounded-2xl shadow p-6">

<h2 class="text-xl font-semibold mb-4">Generated Proxies</h2>

<div class="space-y-4">

{{ range .proxies }}

<div class="border rounded-xl p-4">

<div class="mb-2">
<strong>ID:</strong> {{ .ID }}
</div>

<div class="mb-2">
<strong>Type:</strong> {{ .Type }}
</div>

<div class="mb-2 break-all">
<strong>Secret:</strong> {{ .Secret }}
</div>

<div class="mb-4 break-all">
<strong>Link:</strong> {{ .Link }}
</div>

<form method="POST" action="/delete/{{ .ID }}">
<button class="bg-red-600 text-white px-4 py-2 rounded-lg">
Delete
</button>
</form>

</div>

{{ end }}

</div>
</div>
</div>

</body>
</html>
